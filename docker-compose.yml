version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: doll-shop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: doll_shop
      MYSQL_USER: doll_user
      MYSQL_PASSWORD: doll_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - doll-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHP Application
  php:
    build: .
    container_name: doll-shop-php
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: doll_user
      MYSQL_PASSWORD: doll_pass
      MYSQL_DB: doll_shop
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - doll-network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: doll-shop-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - doll-network

volumes:
  mysql_data:

networks:
  doll-network:
    driver: bridge
